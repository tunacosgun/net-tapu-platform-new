services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: nettapu-postgres
    environment:
      POSTGRES_USER: nettapu_migrator
      POSTGRES_PASSWORD: ${POSTGRES_MIGRATOR_PASSWORD:-migrator_secret_change_me}
      POSTGRES_DB: nettapu
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/migrations:ro
      - ./database/seed:/seed:ro
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nettapu_migrator -d nettapu"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - nettapu
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: nettapu-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret_change_me} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret_change_me}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - nettapu
    deploy:
      resources:
        limits:
          memory: 384M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  monolith:
    build:
      context: .
      dockerfile: apps/monolith/Dockerfile
    container_name: nettapu-monolith
    environment:
      NODE_ENV: ${NODE_ENV:-staging}
      DATABASE_URL: ${DATABASE_URL:-postgresql://nettapu_app:app_secret_change_me@postgres:5432/nettapu}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret_change_me}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production_min_32_chars!!}
      JWT_ISSUER: ${JWT_ISSUER:-nettapu}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-nettapu-platform}
      JWT_ACCESS_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION_DAYS: "7"
      POS_PROVIDER: ${POS_PROVIDER:-mock}
      POS_TIMEOUT_MS: ${POS_TIMEOUT_MS:-7000}
      PAYTR_MERCHANT_ID: ${PAYTR_MERCHANT_ID:-}
      PAYTR_MERCHANT_KEY: ${PAYTR_MERCHANT_KEY:-}
      PAYTR_MERCHANT_SALT: ${PAYTR_MERCHANT_SALT:-}
      PAYTR_BASE_URL: ${PAYTR_BASE_URL:-https://www.paytr.com}
      IYZICO_API_KEY: ${IYZICO_API_KEY:-}
      IYZICO_SECRET_KEY: ${IYZICO_SECRET_KEY:-}
      IYZICO_BASE_URL: ${IYZICO_BASE_URL:-https://sandbox-api.iyzipay.com}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      CLUSTER_WORKERS: ${CLUSTER_WORKERS:-1}
      # Notification providers
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-noreply@nettapu.com}
      NETGSM_USERCODE: ${NETGSM_USERCODE:-}
      NETGSM_PASSWORD: ${NETGSM_PASSWORD:-}
      NETGSM_MSGHEADER: ${NETGSM_MSGHEADER:-NETTAPU}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL:-}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY:-}
      NOTIFICATION_DISPATCH_ENABLED: ${NOTIFICATION_DISPATCH_ENABLED:-true}
      NOTIFICATION_POLL_INTERVAL_MS: ${NOTIFICATION_POLL_INTERVAL_MS:-5000}
      NOTIFICATION_BATCH_SIZE: ${NOTIFICATION_BATCH_SIZE:-10}
      EMAIL_VERIFICATION_EXPIRY_HOURS: ${EMAIL_VERIFICATION_EXPIRY_HOURS:-24}
      PASSWORD_RESET_EXPIRY_MINUTES: ${PASSWORD_RESET_EXPIRY_MINUTES:-30}
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-change_me_internal_service_secret}
      RECONCILIATION_ENABLED: ${RECONCILIATION_ENABLED:-true}
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - monolith_uploads:/app/apps/monolith/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    stop_grace_period: 30s
    restart: unless-stopped
    networks:
      - nettapu
    deploy:
      resources:
        limits:
          memory: 768M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  auction-service:
    build:
      context: .
      dockerfile: apps/auction-service/Dockerfile
    container_name: nettapu-auction
    environment:
      NODE_ENV: ${NODE_ENV:-staging}
      DATABASE_URL: ${DATABASE_URL:-postgresql://nettapu_app:app_secret_change_me@postgres:5432/nettapu}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret_change_me}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production_min_32_chars!!}
      JWT_ISSUER: ${JWT_ISSUER:-nettapu}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-nettapu-platform}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      SNIPER_EXTENSION_SECONDS: ${SNIPER_EXTENSION_SECONDS:-60}
      POS_FAIL_MODE: ${POS_FAIL_MODE:-false}
      POS_PROVIDER: ${POS_PROVIDER:-mock}
      CLUSTER_WORKERS: ${CLUSTER_WORKERS:-1}
      MONOLITH_INTERNAL_URL: http://monolith:3000
      INTERNAL_SERVICE_KEY: ${INTERNAL_SERVICE_KEY:-change_me_internal_service_secret}
      NOTIFICATION_CONSUMER_ENABLED: ${NOTIFICATION_CONSUMER_ENABLED:-true}
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/v1/auctions/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    stop_grace_period: 30s
    restart: unless-stopped
    networks:
      - nettapu
    deploy:
      resources:
        limits:
          memory: 768M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        API_URL: http://monolith:3000
        AUCTION_API_URL: http://auction-service:3001
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://nettapu-demo.tunasoft.tech}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-https://nettapu-demo.tunasoft.tech}
    container_name: nettapu-web
    environment:
      NODE_ENV: production
      API_URL: http://monolith:3000
      AUCTION_API_URL: http://auction-service:3001
    ports:
      - "3002:3002"
    depends_on:
      monolith:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nettapu
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.25-alpine
    container_name: nettapu-nginx
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/certbot:/var/www/certbot:ro
    depends_on:
      monolith:
        condition: service_healthy
      auction-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nettapu
    deploy:
      resources:
        limits:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  nettapu:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  monolith_uploads:
