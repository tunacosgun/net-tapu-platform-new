worker_processes auto;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    # ── Upstream Definitions ──────────────────────────────────

    upstream monolith {
        server monolith:3000;
        keepalive 32;
    }

    upstream auction_service {
        # Sticky sessions via IP hash for WebSocket stability
        ip_hash;
        server auction-service:3001;
        keepalive 32;
    }

    # web_frontend upstream is resolved at runtime via variable in location blocks
    # This prevents nginx from crashing if the web container is not running
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── Rate limiting zones ───────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/s;

    # ── Global Timeouts ───────────────────────────────────────
    proxy_connect_timeout 10s;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;

    # ── Buffers & Limits ──────────────────────────────────────
    client_max_body_size 20m;
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 8k;

    # ── Gzip Compression ─────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # ── Logging ───────────────────────────────────────────────
    log_format json_combined escape=json
        '{"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_response_time":"$upstream_response_time",'
        '"http_user_agent":"$http_user_agent"}';

    access_log /var/log/nginx/access.log json_combined;
    error_log /var/log/nginx/error.log warn;

    # ── HTTP → HTTPS redirect (production) ────────────────────
    server {
        listen 80;
        server_name nettapu.com www.nettapu.com;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }

        # Health check endpoint (used by load balancers)
        location /health {
            access_log off;
            return 200 "ok";
        }
    }

    # ── HTTPS Server (production) ─────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name nettapu.com www.nettapu.com;

        # ── SSL Configuration ─────────────────────────────────
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        # ssl_stapling on;         # Enable with real certs (not self-signed)
        # ssl_stapling_verify on;  # Enable with real certs (not self-signed)

        # ── Security Headers ──────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://maps.googleapis.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://maps.googleapis.com https://maps.gstatic.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' wss://*.nettapu.com https://api.nettapu.com; frame-src 'self' https://www.youtube.com;" always;

        # ── Auth routes → stricter rate limit ─────────────────
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=10 nodelay;
            proxy_pass http://monolith;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── Auction REST API → auction service ────────────────
        location /api/v1/auctions/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://auction_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── Bid endpoint → auction service ────────────────────
        location /api/v1/bids {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://auction_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── All other API routes → monolith ───────────────────
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://monolith;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── POS Callbacks (unauthenticated, signature-verified) ─
        location /api/v1/payments/pos-callback/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://monolith;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── WebSocket auction connections → auction service ───
        # ip_hash upstream ensures sticky sessions for WS
        location /ws/auction/ {
            limit_req zone=ws_limit burst=5 nodelay;
            proxy_pass http://auction_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── File uploads → monolith ──────────────────────────
        location /api/v1/admin/media {
            limit_req zone=upload_limit burst=5 nodelay;
            client_max_body_size 50m;
            proxy_pass http://monolith;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Static assets from monolith (watermarked images) ─
        location /uploads/ {
            proxy_pass http://monolith;
            proxy_set_header Host $host;
            proxy_cache_valid 200 30m;
            expires 30m;
            add_header Cache-Control "public, no-transform";
        }

        # ── Next.js static assets ────────────────────────────
        location /_next/static/ {
            set $web_backend http://web:3002;
            proxy_pass $web_backend;
            expires 365d;
            add_header Cache-Control "public, immutable";
        }

        # ── Frontend (Next.js SSR) ───────────────────────────
        location / {
            set $web_backend http://web:3002;
            proxy_pass $web_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── Health check ──────────────────────────────────────
        location /health {
            access_log off;
            return 200 "ok";
        }

        # ── Block hidden files ────────────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }

    # ── Development Server (no SSL) ───────────────────────────
    # Used when SSL certs are not available (local development)
    server {
        listen 8080;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Auth routes
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=10 nodelay;
            proxy_pass http://monolith;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Auction API
        location /api/v1/auctions/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://auction_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Bids
        location /api/v1/bids {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://auction_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Other API
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://monolith;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket
        location /ws/auction/ {
            limit_req zone=ws_limit burst=5 nodelay;
            proxy_pass http://auction_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Frontend
        location / {
            set $web_backend http://web:3002;
            proxy_pass $web_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            access_log off;
            return 200 "ok";
        }
    }
}
